name: Build and Release Packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.21'
  PACKAGE_NAME: resman

jobs:
  # ================================================
  # BUILD DEB PACKAGES (Ubuntu/Debian)
  # ================================================
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up QEMU (for ARM64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build binary for ${{ matrix.arch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi
          go build -v -ldflags="-s -w -X 'main.version=${GITHUB_REF_NAME:-dev}'" -o ${{ env.PACKAGE_NAME }} .

      - name: Build Debian package
        run: |
          # Installazione dipendenze
          sudo apt-get install -y dpkg-dev fakeroot
          make deb DEB_ARCH=${{ matrix.arch }}

      - name: Rename package with architecture
        run: |
          # Trova il pacchetto generato e rinomina con architettura corretta
          PKG=$(ls build/deb/*.deb | head -1)
          if [ -n "$PKG" ]; then
            NEWNAME="build/deb/${{ env.PACKAGE_NAME }}-${GITHUB_REF_NAME:-dev}-linux-${{ matrix.arch }}.deb"
            mv "$PKG" "$NEWNAME"
            echo "Package: $NEWNAME"
          fi

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}.deb
          path: build/deb/*.deb
          retention-days: 30

  # ================================================
  # BUILD RPM PACKAGES (RHEL/CentOS/Fedora)
  # ================================================
  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            container: rockylinux:9
          - arch: arm64
            container: rockylinux:9
      fail-fast: false

    container:
      image: ${{ matrix.container }}
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (RockyLinux)
        run: |
          dnf install -y epel-release
          dnf install -y \
            rpm-build \
            rpmdevtools \
            make \
            gcc \
            sqlite-devel \
            systemd-devel \
            wget \
            tar \
            gzip

      - name: Install Go 1.21+
        run: |
          # Installazione manuale Go 1.21 (RockyLinux 9 ha Go 1.20 di default)
          GO_VERSION="1.21.6"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            GO_ARCH="amd64"
          elif [ "$ARCH" = "aarch64" ]; then
            GO_ARCH="arm64"
          else
            GO_ARCH="$ARCH"
          fi

          echo "Downloading Go ${GO_VERSION} for ${GO_ARCH}..."
          wget -q "https://go.dev/dl/go${GO_VERSION}.linux-${GO_ARCH}.tar.gz" -O /tmp/go.tar.gz

          echo "Installing Go..."
          rm -rf /usr/local/go
          tar -C /usr/local -xzf /tmp/go.tar.gz
          ln -sf /usr/local/go/bin/go /usr/local/bin/go
          ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt

          export PATH=$PATH:/usr/local/go/bin
          echo "Go installed: $(go version)"
          echo "PATH=$PATH:/usr/local/go/bin" >> $GITHUB_ENV
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Setup RPM build environment
        run: |
          # Crea struttura rpmbuild
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          echo "%_topdir $HOME/rpmbuild" > ~/.rpmmacros

      - name: Build RPM package
        run: |
          export GO111MODULE=on
          export CGO_ENABLED=1

          # Estrai versione dal tag o usa dev
          VERSION="${GITHUB_REF_NAME:-1.0.0}"
          VERSION="${VERSION#v}"  # Rimuovi prefisso 'v' se presente

          # Crea tarball sorgente
          mkdir -p ${PACKAGE_NAME}-${VERSION}
          cp -r *.go go.mod go.sum \
            config/ cgroup/ metrics/ state/ logging/ reloader/ mcp/ database/ \
            README.md LICENSE CHANGELOG.md \
            packaging/ docs/ \
            ${PACKAGE_NAME}-${VERSION}/

          tar czf ~/rpmbuild/SOURCES/${PACKAGE_NAME}-${VERSION}.tar.gz ${PACKAGE_NAME}-${VERSION}

          # Build RPM
          rpmbuild -ba packaging/rpm/${PACKAGE_NAME}.spec \
            --define "_version ${VERSION}"

      - name: Collect RPM artifacts
        run: |
          mkdir -p output
          cp ~/rpmbuild/RPMS/*/*.rpm output/

          # Rinomina con versione e architettura
          for f in output/*.rpm; do
            if [ -f "$f" ]; then
              # Estrai architettura dal filename
              ARCH=$(rpm -qp --queryformat "%{ARCH}" "$f" 2>/dev/null || echo "${{ matrix.arch }}")
              NEWNAME="output/${{ env.PACKAGE_NAME }}-${GITHUB_REF_NAME:-dev}-linux-${ARCH}.rpm"
              mv "$f" "$NEWNAME"
              echo "RPM: $NEWNAME"
            fi
          done

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.arch }}.rpm
          path: output/*.rpm
          retention-days: 30

  # ================================================
  # BUILD STATIC BINARY (no CGO)
  # ================================================
  build-static:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build static binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -v -ldflags="-s -w -X 'main.version=${GITHUB_REF_NAME:-dev}' -extldflags '-static'" \
            -a -installsuffix cgo -o ${{ env.PACKAGE_NAME }}-static-linux-${{ matrix.arch }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-static-linux-${{ matrix.arch }}
          path: ${{ env.PACKAGE_NAME }}-static-linux-${{ matrix.arch }}
          retention-days: 30

  # ================================================
  # CREATE GITHUB RELEASE (solo su tag)
  # ================================================
  release:
    needs: [build-deb, build-rpm, build-static]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Release Notes
        run: |
          echo "## ResMan Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Packages" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "| Package | Arch | Description |" >> RELEASE_NOTES.md
          echo "|---------|------|-------------|" >> RELEASE_NOTES.md
          echo "| .deb | amd64, arm64 | Debian/Ubuntu package |" >> RELEASE_NOTES.md
          echo "| .rpm | x86_64, aarch64 | RHEL/CentOS/Rocky Linux package |" >> RELEASE_NOTES.md
          echo "| static binary | amd64, arm64 | Static binary (no CGO) |" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Installation" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo '```bash' >> RELEASE_NOTES.md
          echo "# Debian/Ubuntu" >> RELEASE_NOTES.md
          echo "sudo dpkg -i resman_*.deb" >> RELEASE_NOTES.md
          echo "sudo systemctl enable --now resman" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "# RHEL/CentOS/Rocky Linux" >> RELEASE_NOTES.md
          echo "sudo rpm -ivh resman-*.rpm" >> RELEASE_NOTES.md
          echo "sudo systemctl enable --now resman" >> RELEASE_NOTES.md
          echo '```' >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*-static-*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true

  # ================================================
  # VERIFY PACKAGES (installazione test)
  # ================================================
  verify-packages:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        pkg_type: [deb, rpm]

    steps:
      - name: Download DEB artifact
        if: matrix.pkg_type == 'deb'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-amd64.deb

      - name: Test DEB installation
        if: matrix.pkg_type == 'deb'
        run: |
          sudo dpkg -i *.deb || true
          dpkg -I *.deb

      - name: Download RPM artifact
        if: matrix.pkg_type == 'rpm'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-amd64.rpm

      - name: Test RPM in container
        if: matrix.pkg_type == 'rpm'
        run: |
          docker run --rm -v $PWD:/pkgs rockylinux:9 bash -c "
            rpm -qpil /pkgs/*.rpm
          "

  # ================================================
  # LINTING AND TESTS
  # ================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          go test -v -cover ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Build check
        run: |
          make build
