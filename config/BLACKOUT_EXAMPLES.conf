# CPU Manager Blackout Timeframes - Examples
# ===========================================
#
# BLACKOUT TIMEFRAMES specificano quando CPU Manager NON deve applicare limiti CPU.
# Utile per ambienti di produzione dove non vuoi limiti durante orari critici.
#
# Formato: "giorni ore" (multipli timeframe separati da ;)
#
# Giorni:
#   0 = Domenica
#   1 = Lunedì
#   2 = Martedì
#   3 = Mercoledì
#   4 = Giovedì
#   5 = Venerdì
#   6 = Sabato
#   * = Tutti i giorni
#   1-5 = Lunedì a Venerdì
#   0,6 = Weekend (Sabato e Domenica)
#
# Ore: formato 24 ore (00-23)
#
# ============================================================================
# ESEMPI BASE
# ============================================================================

# 1. Disabilita durante orario lavorativo standard (Lun-Ven, 8-18)
CPU_MANAGER_BLACKOUT=1-5 08-18

# 2. Disabilita solo la mattina (es: meeting, standup)
CPU_MANAGER_BLACKOUT=1-5 08-10

# 3. Disabilita nel weekend (Sab-Dom, tutto il giorno)
CPU_MANAGER_BLACKOUT=0,6 00-23

# 4. Disabilita sempre (per testing)
CPU_MANAGER_BLACKOUT=* 00-23

# 5. Nessun blackout (default - CPU Manager sempre attivo)
CPU_MANAGER_BLACKOUT=

# ============================================================================
# ESEMPI AVANZATI - MULTIPLI TIMEFRAME
# ============================================================================

# 6. Disabilita orario lavorativo + weekend
# Risultato: CPU Manager attivo solo Lun-Ven 18-08 (sera/notte)
CPU_MANAGER_BLACKOUT=1-5 08-18;0,6 00-23

# 7. Disabilita mattina e weekend
# Risultato: CPU Manager attivo solo Lun-Ven 12-18 (pomeriggio)
CPU_MANAGER_BLACKOUT=1-5 00-12;0,6 00-23

# 8. Disabilita solo Venerdì pomeriggio (early weekend)
CPU_MANAGER_BLACKOUT=5 14-23

# 9. Disabilita Lunedì mattina e Venerdì pomeriggio
CPU_MANAGER_BLACKOUT=1 08-12;5 14-23

# ============================================================================
# SCENARI REALI
# ============================================================================

# SCENARIO 1: Server di Sviluppo Aziendale
# Obiettivo: Non limitare durante orario lavorativo, limitare la sera
# Orario: Lun-Ven 8-18 sviluppo attivo, 18-8 build pesanti
CPU_MANAGER_BLACKOUT=1-5 08-18

# SCENARIO 2: Ambiente di Produzione
# Obiettivo: Mai limitare durante la settimana, ok nel weekend
# Motivazione: SLA critici Lun-Ven, manutenzione weekend
CPU_MANAGER_BLACKOUT=1-5 00-23

# SCENARIO 3: Server Batch Notturno
# Obiettivo: Limitare di giorno, non limitare di notte
# Orario: Batch jobs 20-06, sviluppo 08-18
CPU_MANAGER_BLACKOUT=0-6 20-06

# SCENARIO 4: Ambiente Multi-Timezone
# Obiettivo: Disabilitare durante meeting globali (9-11 CET)
# Meeting: Lun-Ven 9-11 CET con team USA/Asia
CPU_MANAGER_BLACKOUT=1-5 09-11

# SCENARIO 5: Testing/QA Environment
# Obiettivo: Mai limitare durante testing intensivo
# Periodo: Sprint di 2 settimane
# Nota: Ricordati di rimuovere dopo lo sprint!
CPU_MANAGER_BLACKOUT=* 00-23

# ============================================================================
# COMBINAZIONE CON ALTRE CONFIGURAZIONI
# ============================================================================

# BLACKOUT + USER_EXCLUDE_LIST
# Durante blackout: NESSUN limite applicato
# Fuori blackout: Solo utenti matching esclusi
#
# Esempio:
# CPU_MANAGER_BLACKOUT=1-5 08-18
# USER_EXCLUDE_LIST=^www-.*,mysql
#
# Risultato:
# - 08-18 Lun-Ven: Nessun limite per nessuno
# - 18-08 Lun-Ven: www-* e mysql esclusi, altri limitati
# - Weekend: Nessun blackout, www-* e mysql esclusi

# BLACKOUT + USER_INCLUDE_LIST
# Durante blackout: NESSUN limite applicato
# Fuori blackout: Solo utenti matching monitorati
#
# Esempio:
# CPU_MANAGER_BLACKOUT=1-5 08-18
# USER_INCLUDE_LIST=^dev-.*
#
# Risultato:
# - 08-18 Lun-Ven: Nessun limite per nessuno
# - 18-08 Lun-Ven: Solo utenti dev-* monitorati/limitati
# - Weekend: Nessun blackout, solo dev-* monitorati

# ============================================================================
# NOTE IMPORTANTI
# ============================================================================

# 1. PRECEDENZA
# Blackout prevale SEMPRE su USER_INCLUDE_LIST e USER_EXCLUDE_LIST
# Durante blackout, CPU Manager NON applica MAI limiti

# 2. TIMEZONE
# CPU Manager usa la timezone di sistema del server
# Verifica con: timedatectl (systemd) o date (traditional)

# 3. LOGGING
# Entrata blackout: [INFO] Entering blackout timeframe - CPU limits suspended until 18:00
# Durante blackout: [DEBUG] Skipping control cycle - blackout timeframe active
# Uscita blackout: [INFO] Exiting blackout timeframe - CPU limits re-enabled

# 4. VALIDAZIONE
# Errori di parsing bloccano l'avvio di CPU Manager
# Esempi di errori:
# - Ore non valide: 25-30 (deve essere 00-23)
# - Giorni non validi: 7-8 (deve essere 0-6)
# - Formato errato: "1-5" (mancano le ore)

# 5. BEST PRACTICES
# - Usa commenti per spiegare perché un blackout è configurato
# - Testa in ambiente di staging prima di produzione
# - Monitora i log per verificare che i blackout funzionino come atteso
# - Documenta i blackout nel tuo runbook operativo

# ============================================================================
# TROUBLESHOOTING
# ============================================================================

# Problema: Blackout non funziona
# Soluzione:
# 1. Verifica formato: CPU_MANAGER_BLACKOUT=1-5 08-18 (spazio tra giorni e ore)
# 2. Controlla timezone: timedatectl
# 3. Verifica log: tail -f /var/log/cpu-manager.log | grep blackout
# 4. Riavvia CPU Manager: systemctl restart cpu-manager

# Problema: Troppi log durante blackout
# Soluzione:
# - Log INFO solo per entrata/uscita (normale)
# - Log DEBUG durante blackout (imposta LOG_LEVEL=WARN per nasconderli)

# Problema: Blackout termina ma limiti non si riapplicano
# Soluzione:
# 1. Controlla log uscita blackout
# 2. Verifica che CPU soglia sia ancora superata
# 3. Attendi prossimo ciclo di controllo (default: 30 secondi)
